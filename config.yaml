# Model Configuration
model:
  model_name: tazado_fruit_detection
  backbone: mobilenet_v3_small
  input_size: 224
  num_classes: 4  # alphonso, kesar, langda, other
  dropout_rate: 0.3

# Training Configuration
training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0001
  optimizer: adam
  loss_fn: categorical_crossentropy
  validation_split: 0.2

# Data Configuration
data:
  data_dir: data/
  raw_dir: data/raw/
  processed_dir: data/processed/
  splits_dir: data/splits/
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
